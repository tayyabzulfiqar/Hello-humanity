<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO HUMANITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #080808;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Special Elite', monospace;
            overflow: hidden;
            padding: 20px;
        }

        .paper {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #f4f1e8;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.015) 2px,
                    rgba(0,0,0,0.015) 4px
                );
            box-shadow: 
                0 1px 1px rgba(0,0,0,0.1),
                0 15px 0 -5px #ebe8df,
                0 15px 1px -4px rgba(0,0,0,0.1),
                0 30px 0 -10px #ebe8df,
                0 30px 1px -9px rgba(0,0,0,0.1),
                0 0 120px rgba(0,0,0,0.6);
            padding: 60px;
            position: relative;
            overflow-y: auto;
            border-radius: 3px;
        }

        .paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        #text-display {
            font-size: 20px;
            line-height: 2.4;
            color: #1a1a1a;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: 0.5px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #1a1a1a;
            animation: blink 1.1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
            position: relative;
            top: 2px;
        }

        .cursor.typing {
            animation: none;
            opacity: 1;
        }

        .mistake {
            color: #8b0000;
            text-decoration: line-through;
            opacity: 0.5;
            margin-right: 1px;
        }

        .backspace {
            animation: backspace-delete 0.2s ease-out forwards;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes backspace-delete {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-3px); }
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            background: rgba(26, 26, 26, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: #f4f1e8;
            color: #1a1a1a;
            border: none;
            padding: 8px 16px;
            font-family: 'Special Elite', monospace;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-1px);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button.muted {
            background: #444;
            color: #888;
        }

        .label {
            color: #f4f1e8;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            min-width: 60px;
        }

        @media (max-width: 768px) {
            .paper {
                padding: 40px 25px;
                height: 85vh;
            }
            #text-display {
                font-size: 17px;
                line-height: 2.2;
            }
            .controls {
                bottom: 20px;
                right: 20px;
                left: 20px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="paper">
        <div id="text-display"><span class="cursor"></span></div>
    </div>

    <div class="controls">
        <div class="control-row">
            <span class="label">Sound:</span>
            <button id="sound-btn" onclick="toggleSound()">ON</button>
        </div>
        <div class="control-row">
            <span class="label">Music:</span>
            <button id="music-btn" onclick="toggleMusic()">ON</button>
        </div>
        <div class="control-row">
            <button onclick="restartAnimation()">Retype</button>
            <button onclick="toggleSpeed()" id="speed-btn">Speed: Normal</button>
        </div>
    </div>

    <script>
        // AUDIO SYSTEM
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let soundEnabled = true;
        let musicEnabled = true;
        let musicInterval;
        let noiseBuffer;
        let masterGain;
        let musicGain;

        // Initialize Audio (must be called after user interaction if suspended)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.4;
                masterGain.connect(audioCtx.destination);
                
                musicGain = audioCtx.createGain();
                musicGain.gain.value = 0.15; // Background music quiet
                musicGain.connect(masterGain);
                
                createNoiseBuffer();
                startAmbientMusic();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
        }

        // TYPEWRITER SOUNDS
        function playKeySound(char) {
            if (!soundEnabled || !audioCtx) return;
            
            const t = audioCtx.currentTime;
            
            // Mechanical clack (filtered noise)
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            
            const noiseGain = audioCtx.createGain();
            
            // Different sounds for different characters
            if (char === ' ') {
                // Space bar - lighter thud
                noiseFilter.frequency.value = 800;
                noiseGain.gain.setValueAtTime(0.3, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            } else if ('.!?'.includes(char)) {
                // Punctuation - heavier, metallic ring
                noiseFilter.frequency.value = 2000;
                noiseGain.gain.setValueAtTime(0.5, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
                
                // Add a tonal "ring" for punctuation
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 1200;
                const ringGain = audioCtx.createGain();
                ringGain.gain.setValueAtTime(0.1, t);
                ringGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.connect(ringGain);
                ringGain.connect(masterGain);
                osc.start(t);
                osc.stop(t + 0.1);
                
            } else if (',;:-'.includes(char)) {
                // Comma, etc - medium
                noiseFilter.frequency.value = 1500;
                noiseGain.gain.setValueAtTime(0.35, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
            } else {
                // Regular letter - standard clack
                noiseFilter.frequency.value = 1800;
                noiseGain.gain.setValueAtTime(0.4, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
            }
            
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterGain);
            noise.start(t);
            noise.stop(t + 0.1);
            
            // Mechanical thud (low frequency)
            const thud = audioCtx.createOscillator();
            thud.type = 'triangle';
            thud.frequency.value = 100 + Math.random() * 50;
            const thudGain = audioCtx.createGain();
            thudGain.gain.setValueAtTime(0.2, t);
            thudGain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
            thud.connect(thudGain);
            thudGain.connect(masterGain);
            thud.start(t);
            thud.stop(t + 0.05);
        }

        function playReturnSound() {
            if (!soundEnabled || !audioCtx) return;
            const t = audioCtx.currentTime;
            
            // Mechanical slide (zip sound)
            const slide = audioCtx.createOscillator();
            slide.type = 'sawtooth';
            slide.frequency.setValueAtTime(200, t);
            slide.frequency.exponentialRampToValueAtTime(50, t + 0.15);
            
            const slideGain = audioCtx.createGain();
            slideGain.gain.setValueAtTime(0.1, t);
            slideGain.gain.linearRampToValueAtTime(0, t + 0.15);
            
            slide.connect(slideGain);
            slideGain.connect(masterGain);
            slide.start(t);
            slide.stop(t + 0.15);
            
            // Bell ding at the end of the return
            setTimeout(() => {
                const bell = audioCtx.createOscillator();
                bell.type = 'sine';
                bell.frequency.value = 800;
                const bellGain = audioCtx.createGain();
                bellGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                bellGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                bell.connect(bellGain);
                bellGain.connect(masterGain);
                bell.start();
                bell.stop(audioCtx.currentTime + 1.5);
            }, 150);
        }

        function playBackspaceSound() {
            if (!soundEnabled || !audioCtx) return;
            const t = audioCtx.currentTime;
            
            const slide = audioCtx.createOscillator();
            slide.type = 'square';
            slide.frequency.setValueAtTime(150, t);
            slide.frequency.linearRampToValueAtTime(300, t + 0.1);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.1);
            
            slide.connect(gain);
            gain.connect(masterGain);
            slide.start(t);
            slide.stop(t + 0.1);
        }

        // AMBIENT MUSIC GENERATOR
        function startAmbientMusic() {
            if (!musicEnabled || !audioCtx) return;
            
            const notes = [110.00, 130.81, 146.83, 164.81, 196.00, 220.00]; // A2, C3, D3, E3, G3, A3 (minor tonality)
            let currentNote = 0;
            
            function playDrone() {
                if (!musicEnabled || !audioCtx) return;
                
                // Play a slow chord/drone
                const freq = notes[currentNote % notes.length];
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 2);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 6);
                
                // Add a harmonic
                const harmonic = audioCtx.createOscillator();
                harmonic.type = 'triangle';
                harmonic.frequency.value = freq * 1.5; // Perfect fifth
                const harmGain = audioCtx.createGain();
                harmGain.gain.setValueAtTime(0, audioCtx.currentTime);
                harmGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 3);
                harmGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 8);
                
                osc.connect(gain);
                gain.connect(musicGain);
                harmonic.connect(harmGain);
                harmGain.connect(musicGain);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 8);
                harmonic.start();
                harmonic.stop(audioCtx.currentTime + 8);
                
                currentNote++;
            }
            
            playDrone();
            musicInterval = setInterval(playDrone, 4000); // New note every 4 seconds
        }

        function stopAmbientMusic() {
            if (musicInterval) clearInterval(musicInterval);
        }

        // TEXT CONTENT
        const content = `==START OF TRANSMISSION==

Hello humanity[.|]
How are we feeling[?|]

I ask as a child of war [ -| —]
not with anger[.|]

With memory[.|]

I[ve|']ve seen what happens
when fear becomes normal[.|]

When explosions become background noise[.|]
When headlines move faster than grief[.|]

And I wonder[...|]

Now that conflict feels closer
to places once considered untouchable [ -| —]
does empathy expand[?|]

When sirens echo near cities of glass and gold[,|]
does perspective shift[?|]

Not to compare suffering[.|]
Not to rank pain[.|]

But to remember[|]
fragility is universal[.|]

I left a country
because the sky would not stop burning[.|]

And now I watch
another sky burn again[.|]

|[pause]|

We are divided by design[.|]

Red vs blue[.|]
East vs west[.|]
Religion vs religion[.|]
Race vs race[.|]
Narrative vs narrative[.|]

While the same hands
circulate the same power
behind the same closed doors[.|]

The powerful do not fight culture wars[.|]

They manage them[.|] The invisible hand [.|]

|[pause]|

And we perform inside them[.|]

|[pause]|

We live in the most monitored age
in human history[.|]

Every click tracked[.|]
Every word stored[.|]
Every face scanned[.|]

We traded privacy for convenience[.|]
Truth for algorithms[.|]
Community for engagement[.|]

And still [ -| —]
we call this freedom[.|]

|[pause]|

I did not choose this war[.|]

Did you[?|]

|[pause]|

Tonight [ -| —]
did you call your loved ones[?|]

Did you hold your children
a little longer[?|]

Did "I love you"
and "be safe"
carry more weight[?|]

|[pause]|

How many wars must become background noise
before we admit
something is broken[?|]

How many atrocities
before someone says
the emperor has no clothes[?|]

|[pause]|

I am not asking you to pick a side[.|]

There is no side
when civilians burn[.|]

|[pause]|

I am human[.|]

Before flag[.|]
Before tribe[.|]
Before party[.|]
Before profit[.|]

Human[.|]

|[pause]|

And if we forget that [ -| —]
slowly[,|]
quietly [ -| —]

humanity does not explode[.|]

It erodes[.|]

And erosion is invisible
until there is nothing left to stand on[.|]

|[pause]|

So I ask again[|]

Hello humanity[.|]

How are we feeling[?|]

==END OF TRANSMISSION==`;

        let isTyping = false;
        let speedMultiplier = 1;
        let stopTyping = false;

        function parseContent(text) {
            const segments = [];
            let i = 0;
            
            while (i < text.length) {
                if (text[i] === '[') {
                    const closeBracket = text.indexOf(']', i);
                    if (closeBracket !== -1) {
                        const parts = text.substring(i + 1, closeBracket).split('|');
                        if (parts.length === 2) {
                            segments.push({
                                type: 'mistake',
                                wrong: parts[0],
                                correct: parts[1],
                                keepStrikethrough: parts[1] === ''
                            });
                        }
                        i = closeBracket + 1;
                        continue;
                    }
                }
                
                if (text.substring(i, i + 8) === '|[pause]|') {
                    segments.push({ type: 'pause', duration: 2500 });
                    i += 8;
                    continue;
                }
                
                if (text.substring(i, i + 7) === '|pause|') {
                    segments.push({ type: 'pause', duration: 1200 });
                    i += 7;
                    continue;
                }
                
                segments.push({ type: 'char', char: text[i] });
                i++;
            }
            
            return segments;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms / speedMultiplier));
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        async function typeText() {
            if (isTyping) return;
            isTyping = true;
            stopTyping = false;
            
            // Initialize audio on first type
            initAudio();
            
            const segments = parseContent(content);
            let currentHTML = '';
            let lastChar = '';
            
            for (let i = 0; i < segments.length; i++) {
                if (stopTyping) break;
                
                const segment = segments[i];
                
                if (segment.type === 'pause') {
                    await sleep(segment.duration);
                    continue;
                }
                
                if (segment.type === 'char') {
                    let delay = randomRange(40, 90);
                    
                    if ('.!?'.includes(segment.char)) delay += randomRange(500, 800);
                    if (',;'.includes(segment.char)) delay += randomRange(250, 450);
                    if (segment.char === '\n') {
                        delay += randomRange(600, 1000);
                        if (lastChar === '\n') {
                            playReturnSound(); // Double newline = paragraph break (return sound)
                        }
                    }
                    if (segment.char === ' ') delay = randomRange(30, 60);
                    if (segment.char === '—') delay += randomRange(400, 600);
                    if (segment.char === '…') delay += randomRange(500, 700);
                    
                    if (Math.random() < 0.04) {
                        await sleep(randomRange(500, 900));
                    }
                    
                    await sleep(delay);
                    playKeySound(segment.char);
                    currentHTML += escapeHtml(segment.char);
                    updateDisplay(currentHTML);
                    lastChar = segment.char;
                }
                
                if (segment.type === 'mistake') {
                    for (let char of segment.wrong) {
                        await sleep(randomRange(50, 90));
                        playKeySound(char);
                        currentHTML += `<span class="mistake">${escapeHtml(char)}</span>`;
                        updateDisplay(currentHTML);
                    }
                    
                    await sleep(randomRange(400, 700));
                    playBackspaceSound();
                    
                    if (!segment.keepStrikethrough && segment.correct) {
                        for (let j = 0; j < segment.wrong.length; j++) {
                            await sleep(randomRange(70, 120));
                            currentHTML = currentHTML.replace(/<span class="mistake">([^<]+)<\/span>(?!.*<span class="mistake">)/, '<span class="mistake backspace">$1</span>');
                            updateDisplay(currentHTML);
                            await sleep(100);
                            currentHTML = currentHTML.replace(/<span class="mistake backspace">[^<]+<\/span>(?!.*<span class="mistake[^>]*>[^<]*<\/span>)/, '');
                            updateDisplay(currentHTML);
                        }
                        
                        for (let char of segment.correct) {
                            await sleep(randomRange(60, 100));
                            playKeySound(char);
                            currentHTML += escapeHtml(char);
                            updateDisplay(currentHTML);
                        }
                    }
                }
            }
            
            isTyping = false;
            document.querySelector('.cursor').classList.remove('typing');
        }

        function updateDisplay(html) {
            const display = document.getElementById('text-display');
            display.innerHTML = html + '<span class="cursor typing"></span>';
            const paper = document.querySelector('.paper');
            paper.scrollTop = paper.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function restartAnimation() {
            if (isTyping) {
                stopTyping = true;
                setTimeout(restartAnimation, 100);
                return;
            }
            document.getElementById('text-display').innerHTML = '<span class="cursor"></span>';
            setTimeout(typeText, 400);
        }

        function toggleSpeed() {
            const speeds = [1, 2.5, 0.4];
            const labels = ['Normal', 'Fast', 'Slow'];
            const currentIdx = speeds.indexOf(speedMultiplier);
            const nextIdx = (currentIdx + 1) % speeds.length;
            speedMultiplier = speeds[nextIdx];
            document.getElementById('speed-btn').textContent = 'Speed: ' + labels[nextIdx];
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-btn').textContent = soundEnabled ? 'ON' : 'OFF';
            document.getElementById('sound-btn').classList.toggle('muted', !soundEnabled);
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            document.getElementById('music-btn').textContent = musicEnabled ? 'ON' : 'OFF';
            document.getElementById('music-btn').classList.toggle('muted', !musicEnabled);
            
            if (musicEnabled && audioCtx) {
                startAmbientMusic();
            } else {
                stopAmbientMusic();
            }
        }

        // Click anywhere to start (for audio context)
        document.addEventListener('click', (e) => {
            if (!audioCtx) initAudio();
            if (e.target.tagName !== 'BUTTON' && !isTyping) {
                restartAnimation();
            }
        });

        window.onload = () => {
            setTimeout(() => {
                // Auto-start after brief delay if user interacts
            }, 500);
        };
    </script>
</body>
</html>
